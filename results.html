<!DOCTYPE html>
<html>
<head>
    <title>College Results 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            width: 250px;
        }

        button {
            background: #002147;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            display: none;
        }

        table, th, td {
            border: 1px solid #333;
            padding: 8px 15px;
        }

        th {
            background: #002147;
            color: white;
        }

        .explosion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: red;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 50px;
            font-weight: bold;
            z-index: 9999;
            animation: flash 0.3s infinite alternate;
        }

        @keyframes flash {
            from { background: black; }
            to { background: darkred; }
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, -5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(0px, 0px); }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>SMCE UG Exam Results - 2026</h2>
    <input type="text" placeholder="Register Number" required>
    <br>
    <input type="date" required>
    <br>
    <button onclick="showFakeResult()">Get Result</button>

    <table id="marksTable">
        <tr>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        <tr><td>Matrices&Calculus</td><td>F</td></tr>
        <tr><td>Problem Solving Python</td><td>F</td></tr>
        <tr><td>Engineering Physics</td><td>F</td></tr>
        <tr><td>Engineering chemistry</td><td>F</td></tr>
        <tr><th>Total</th><th>F(FAIL)</th></tr>
    </table>
</div>

<div class="explosion" id="boom">
    💀 APRIL FOOL 😂 💀
    <div style="font-size:20px; color:white; margin-top:20px;">
        Relax macha 😈 You are safe!
    </div>
</div>

<script>
function showFakeResult() {
    document.getElementById("marksTable").style.display = "table";

    setTimeout(function(){
        explode();
    }, 3000);
}

function explode() {

    // Vibrate phone (if supported)
    if (navigator.vibrate) {
        navigator.vibrate([500, 200, 500]);
    }

    // Shake screen
    document.body.classList.add("shake");

    setTimeout(function(){
        document.getElementById("boom").style.display = "flex";
    }, 800);
}
</script>

</body>
</html>
