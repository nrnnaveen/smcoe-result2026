<!DOCTYPE html>
<html>
<head>
    <title>College Results 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            margin-top: 120px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            width: 250px;
        }

        button {
            background: #002147;
            color: white;
            border: none;
            border-radius: 5px;
        }

        /* FULL SCREEN EXPLOSION */
        .explosion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: red;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 50px;
            font-weight: bold;
            text-align: center;
            z-index: 9999;
            display: none;
            animation: flash 0.3s infinite alternate;
        }

        @keyframes flash {
            from { background: black; }
            to { background: darkred; }
        }

        /* Screen shake */
        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, -5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(0px, 0px); }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: yellow;
            top: 0;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }

    </style>
</head>

<body>

<div class="container">
    <h2> SMCE UG Results - February 2026</h2>
    <input type="text" placeholder="Register Number">
    <br>
    <input type="date">
    <br>
    <button onclick="explode()">Get Result</button>
</div>

<div class="explosion" id="boom">
    🎉 FAILED IN ALL PAPERS 😂 🎉
    <div style="font-size:20px; color:white; margin-top:20px;">
        Better luck next semester 😈
    </div>
</div>

<script>
function explode() {

    document.body.classList.add("shake");

    setTimeout(function(){
        document.getElementById("boom").style.display = "flex";
        createConfetti();
    }, 1000);
}

function createConfetti() {
    for (let i = 0; i < 100; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = randomColor();
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(confetti);
    }
}

function randomColor() {
    const colors = ["red", "yellow", "blue", "green", "orange", "pink"];
    return colors[Math.floor(Math.random() * colors.length)];
}
</script>

</body>
</html>
