<!DOCTYPE html>
<html>
<head>
    <title>College Results 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            width: 250px;
        }

        button {
            background: #002147;
            color: white;
            border: none;
            border-radius: 5px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            display: none;
        }

        table, th, td {
            border: 1px solid #333;
            padding: 8px 15px;
        }

        th {
            background: #002147;
            color: white;
        }

        .explosion {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: red;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 50px;
            font-weight: bold;
            z-index: 9999;
            display: none;
            animation: flash 0.3s infinite alternate;
        }

        @keyframes flash {
            from { background: black; }
            to { background: darkred; }
        }

        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, -5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(0px, 0px); }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>SMCE UG Results - February 2026</h2>
    <input type="text" placeholder="Register Number">
    <br>
    <input type="date">
    <br>
    <button onclick="showFakeResult()">Get Result</button>

    <table id="marksTable">
        <tr>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        <tr><td>Mathematics</td><td>23</td></tr>
        <tr><td>Data Structures
